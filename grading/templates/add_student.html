{% extends 'base.html' %}
{% block title %}Add Student{% endblock %}

{% block content %}
<div class="d-flex justify-content-center mt-5">
    <div class="card shadow rounded p-4" style="width: 400px;">
        <h3 class="text-center mb-4">Add Student</h3>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="roll" class="form-label">Roll No</label>
                <input type="text" name="roll" id="roll" class="form-control" placeholder="Enter Roll No" required>
            </div>
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" name="name" id="name" class="form-control" placeholder="Enter Name" required>
            </div>
            <div class="mb-3">
                <label for="english" class="form-label">English</label>
                <input type="number" name="english" id="english" class="form-control" placeholder="Marks in English" required>
            </div>
            <div class="mb-3">
                <label for="maths" class="form-label">Maths</label>
                <input type="number" name="maths" id="maths" class="form-control" placeholder="Marks in Maths" required>
            </div>
            <div class="mb-3">
                <label for="science" class="form-label">Science</label>
                <input type="number" name="science" id="science" class="form-control" placeholder="Marks in Science" required>
            </div>
            <div class="mb-3">
                <label for="socialscience" class="form-label">Social Science</label>
                <input type="number" name="socialscience" id="socialscience" class="form-control" placeholder="Marks in Social Science" required>
            </div>
            <div class="mb-3">
                <label for="marathi" class="form-label">Marathi</label>
                <input type="number" name="marathi" id="marathi" class="form-control" placeholder="Marks in Marathi" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Add Student</button>
        </form>
    </div>
</div>
{% endblock %}
