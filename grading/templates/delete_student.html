<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Student</title>
</head>
<body>
<h2> Delete Student</h2>
<p> Are You Sure You Want To Delete <strong> {{ student.name }}</strong> ({{ student.roll }})?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>
<br>
<a href="{% url 'show_students' %}">Cancel</a>

</body>
</html>
